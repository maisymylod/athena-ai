# Fly.io deployment config for the Athena demo server.
# Deploy with: fly launch --no-deploy   (first time, creates the app)
#              fly deploy
# App name "athena-demo" is a placeholder — change to whatever's available.

app = "athena-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ATHENA_CHECKPOINT = "/app/checkpoints/best_model.pt"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
